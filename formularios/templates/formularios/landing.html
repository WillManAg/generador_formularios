<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Documents</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.015em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #86868b;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            display: inline-block;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 400;
            border-radius: 980px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
        }

        .btn-primary {
            background-color: #0071e3;
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: #0077ed;
            transform: scale(1.02);
        }

        .btn-secondary {
            background-color: transparent;
            color: #0071e3;
            border: 1px solid #0071e3;
        }

        .btn-secondary:hover {
            background-color: rgba(0, 113, 227, 0.05);
            transform: scale(1.02);
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.8rem;
            color: #86868b;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">🔧</div>
        <h1>Portal de IT</h1>
        <p>Automatización dinámica de documentación interna.</p>

        <div class="button-group">
            <a href="{% url 'lista_plantillas' %}" class="btn btn-primary">Rellenar Formularios</a>
            
            <a href="/admin/" class="btn btn-secondary">Crear Formularios</a>
        </div>
    </div>

    <div class="footer">
        Open Source Project — Departamento de Sistemas
    </div>

</body>
</html>
